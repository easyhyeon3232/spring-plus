<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>익명 채팅</title>
</head>
<body>
<h1>익명 채팅방</h1>

<div>
    <label for="roomName">채팅방 이름</label>
    <input id="roomName" type="text" placeholder="채팅방 이름">
    <button type="button" onclick="createRoom()">채팅방 생성</button>
</div>

<div>
    <label for="roomId">채팅방 ID</label>
    <input id="roomId" type="number" placeholder="채팅방 ID">
    <button type="button" onclick="connectRoom()">방 입장</button>
</div>

<div>
    <label for="sender">닉네임</label>
    <input id="sender" type="text" placeholder="닉네임">
</div>

<div>
    <label for="message">메시지</label>
    <input id="message" type="text" placeholder="메시지">
    <button type="button" onclick="sendMessage()">전송</button>
</div>

<hr>

<ul id="chat"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let subscription = null;
    let currentRoomId = null;

    function connectRoom() {
        const roomIdInput = document.getElementById('roomId');
        currentRoomId = roomIdInput.value;

        if (!currentRoomId) {
            alert('채팅방 ID를 입력해주세요.');
            return;
        }

        clearChat();

        loadRecentMessages(currentRoomId);

        if (stompClient !== null && stompClient.connected) {
            subscribeRoom(currentRoomId);
            return;
        }

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            subscribeRoom(currentRoomId);
        });
    }

    function subscribeRoom(roomId) {
        if (subscription !== null) {
            subscription.unsubscribe();
        }

        subscription = stompClient.subscribe('/sub/chat/rooms/' + roomId, function (message) {
            const body = JSON.parse(message.body);
            appendMessage(body);
        });
    }

    function loadRecentMessages(roomId) {
        fetch('/chat/rooms/' + roomId + '/messages?page=1&size=30')
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('최근 메시지를 불러오지 못했습니다.');
                }
                return response.json();
            })
            .then(function (data) {
                const messages = data.content.reverse();

                messages.forEach(function (message) {
                    appendMessage(message);
                });
            })
            .catch(function (error) {
                console.error(error);
                alert('최근 메시지 조회 중 오류가 발생했습니다.');
            });
    }

    function sendMessage() {
        if (stompClient === null || !stompClient.connected || currentRoomId === null) {
            alert('먼저 채팅방에 입장해주세요.');
            return;
        }

        const senderInput = document.getElementById('sender');
        const messageInput = document.getElementById('message');

        const sender = senderInput.value;
        const message = messageInput.value;

        if (!message) {
            alert('메시지를 입력해주세요.');
            return;
        }

        stompClient.send('/app/chat/' + currentRoomId + '/send', {}, JSON.stringify({
            sender: sender,
            message: message
        }));

        messageInput.value = '';
    }

    function appendMessage(message) {
        const chat = document.getElementById('chat');

        const li = document.createElement('li');

        const sentAt = message.sentAt ? message.sentAt.replace('T', ' ') : '';
        const sender = message.sender ? message.sender : '익명';

        li.textContent = '[' + message.roomId + '번 방] '
            + sender
            + ': '
            + message.message
            + ' '
            + sentAt;

        chat.appendChild(li);
    }

    function clearChat() {
        document.getElementById('chat').innerHTML = '';
    }

    function createRoom() {
        const roomNameInput = document.getElementById('roomName');
        const roomName = roomNameInput.value;

        if (!roomName) {
            alert('채팅방 이름을 입력해주세요.');
            return;
        }

        fetch('/chat/rooms', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name: roomName
            })
        })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('채팅방 생성에 실패했습니다.');
                }
                return response.json();
            })
            .then(function (room) {
                document.getElementById('roomId').value = room.roomId;
                roomNameInput.value = '';

                connectRoom();
            })
            .catch(function (error) {
                console.error(error);
                alert('채팅방 생성 중 오류가 발생했습니다.');
            });
    }
</script>
</body>
</html>
