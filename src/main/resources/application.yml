spring:
  application:
    name: spring-plus

  datasource:
    url: jdbc:mysql://localhost:3306/plus
    username: ${USERNAME}
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always  # data.sql 자동 실행

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080

# JWT 설정
jwt:
  secret:
    key: ${SECRET}
  expiration: 3600000  # 1시간 (ms)
